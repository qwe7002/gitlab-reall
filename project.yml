name: Reall
options:
  bundleIdPrefix: com.qwe7002
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_LANGUAGE: en
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  Reall:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Reall/Sources
      - path: Reall/Resources
    settings:
      base:
        PRODUCT_NAME: Reall
        PRODUCT_BUNDLE_IDENTIFIER: com.qwe7002.reall
        INFOPLIST_FILE: Reall/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Reall/Resources/Reall.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: NO
    info:
      path: Reall/Resources/Info.plist

  ReallTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Reall/Tests
    dependencies:
      - target: Reall
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qwe7002.reall.tests
